<!DOCTYPE html>
<html>
<head>
    <title>Photo Gallery</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; height: 100vh; justify-content: center; margin: 0; }
        .photo-container { width: 80%; max-width: 800px; text-align: center; }
        img { max-width: 100%; max-height: 70vh; border: 5px solid #333; border-radius: 8px; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; margin: 0 10px; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <div class="photo-container">
        <img id="display" src="" alt="Photo">
        <div class="controls">
            <button onclick="changePhoto(-1)">Previous</button>
            <span id="counter">1 / 1</span>
            <button onclick="changePhoto(1)">Next</button>
        </div>
    </div>

    <script>
        // Add your photo URLs here
        const photos = [
            "https://via.placeholder.com/800x500?text=Photo+1",
            "https://via.placeholder.com/800x500?text=Photo+2",
            "https://via.placeholder.com/800x500?text=Photo+3"
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('display');
        const counterElement = document.getElementById('counter');

        function updateDisplay() {
            imgElement.src = photos[currentIndex];
            counterElement.innerText = `${currentIndex + 1} / ${photos.length}`;
        }

        function changePhoto(direction) {
            currentIndex += direction;
            if (currentIndex >= photos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = photos.length - 1;
            updateDisplay();
        }

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
